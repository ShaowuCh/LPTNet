# LPTNet Configuration for QuickBird Dataset
name: LPTNet_QB

model:
  ms_chans: 4
  dim: 32
  num_tokens: 256
  num_blocks: [1, 1, 1, 1]
  isFR: false
  need_interpolate: true

data:
  train_root: ./data/QB/train
  val_root: ./data/QB/val
  test_rr_root: ./data/QB/test_rr
  test_fr_root: ./data/QB/test_fr
  batch_size: 4
  num_workers: 4
  img_range: 2047
  lr_size: 64
  sensor: QB

training:
  epochs: 600
  lr: 0.0001
  scheduler_step: 300
  scheduler_gamma: 0.99
  val_every: 1
  save_every: 50
